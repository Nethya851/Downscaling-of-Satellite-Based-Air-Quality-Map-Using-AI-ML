{% extends "base_app.html" %}
{% block title %}Profile - AirQuality TN{% endblock %}
{% block page_title %}My Profile{% endblock %}
{% block content %}

<div class="card" style="max-width:480px;">
  <h3>Account Details</h3>
  <div class="form-group"><label>Full Name</label><input type="text" value="{{ user['full_name'] }}" disabled></div>
  <div class="form-group"><label>Email</label><input type="text" value="{{ user['email'] }}" disabled></div>
  <div class="form-group"><label>Account Type</label><input type="text" value="{{ user['role']|capitalize }}" disabled></div>
  <div class="form-group"><label>Member Since</label><input type="text" value="{{ user['created_at'] }}" disabled></div>
</div>

{% endblock %}

{% extends "base_public.html" %}
{% block title %}Login - AirQuality TN{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h2>Welcome Back!</h2>
    <p class="sub">Login to your account</p>
    <form method="POST" action="{{ url_for('main.login') }}">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Login</button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('main.register') }}">Register here</a><br>
      <a href="{{ url_for('main.admin_login') }}" style="color:var(--text-muted);font-size:12px;">Admin Login →</a>
    </div>
  </div>
</div>
{% endblock %}
